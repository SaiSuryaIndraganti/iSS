<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iSS - Digital Happiness Platform</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

       <style>
        /* =========================================
           THEME ENGINE & DESIGN SYSTEM
           ========================================= */
        :root {
            --color-lavender: #E6E6FA;
            --color-cherry-blossom: #FFB7C5;
            --color-soft-violet: #D8BFD8;
            --color-rose-pink: #FFD1DC;
            --color-warm-white: #FAFAFA;
            --color-light-cream: #FFFDD0;
            --color-soft-gray: #F5F5F7;
            --color-muted-plum: #DDA0DD;
            --color-text-main: #333333;
            --color-text-muted: #888888;
            --color-accent-blue: #AEC6CF;
            
            --glass-bg: rgba(250, 250, 250, 0.85);
            --glass-border: 1px solid rgba(255, 255, 255, 0.6);
            --shadow-floating: 0 10px 25px rgba(216, 191, 216, 0.2);
            --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.03);
            
            --component-bg: #FFFFFF;
            --input-bg: rgba(255,255,255,0.8);
            --pill-bg: rgba(255,255,255,0.6);
            --skeleton-grad: linear-gradient(90deg, rgba(230, 230, 250, 0.5) 25%, rgba(255, 255, 255, 0.8) 50%, rgba(230, 230, 250, 0.5) 75%);
            --ripple-color: rgba(216, 191, 216, 0.4);
            --modal-overlay: rgba(0, 0, 0, 0.4);

            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-xxl: 48px;

            --border-radius-sm: 12px;
            --border-radius-md: 20px;
            --border-radius-lg: 32px;
            
            --transition-gentle: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            --transition-fast: 0.2s ease-in-out;
        }
              [data-theme="dark"] {
            --color-warm-white: #121215; 
            --color-text-main: #EAEAEA;
            --color-text-muted: #8E8E93;
            --color-soft-gray: #1C1C1E;
            --color-muted-plum: #A3707A; 
            --color-soft-violet: #4A3B4C;
            
            --glass-bg: rgba(20, 20, 23, 0.85);
            --glass-border: 1px solid rgba(255, 255, 255, 0.05);
            --shadow-floating: 0 10px 25px rgba(0, 0, 0, 0.5);
            --shadow-subtle: 0 4px 12px rgba(0, 0, 0, 0.3);
            
            --component-bg: #1C1C1E;
            --input-bg: #2C2C2E;
            --pill-bg: #2C2C2E;
            --skeleton-grad: linear-gradient(90deg, rgba(40, 40, 45, 0.5) 25%, rgba(60, 60, 65, 0.8) 50%, rgba(40, 40, 45, 0.5) 75%);
            --ripple-color: rgba(255, 255, 255, 0.1);
            --modal-overlay: rgba(0, 0, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { font-family: 'Nunito', sans-serif; background-color: var(--color-warm-white); color: var(--color-text-main); overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; line-height: 1.5; transition: background-color var(--transition-gentle), color var(--transition-gentle); }

        #app-container { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        #screen-container { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 100px; scroll-behavior: smooth; }

        /* =========================================
           MICRO-INTERACTIONS & ANIMATIONS
           ========================================= */
        .ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-anim 0.6s linear; background-color: var(--ripple-color); pointer-events: none; }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        .stagger-entrance { opacity: 0; animation: slideUpFade 0.5s var(--transition-gentle) forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .float-anim { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-12px); } 100% { transform: translateY(0px); } }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
            .stagger-entrance { opacity: 1; transform: none; }
        }

        /* =========================================
           CORE COMPONENTS & DASHBOARD
           ========================================= */
        .text-title { font-size: 28px; font-weight: 700; color: var(--color-text-main); letter-spacing: -0.5px; transition: color var(--transition-gentle); }
        .text-subtitle { font-size: 16px; font-weight: 400; color: var(--color-text-muted); transition: color var(--transition-gentle); }
        .screen { padding: var(--spacing-xl) var(--spacing-lg); animation: fadeIn var(--transition-gentle); }
        .header-section { margin-bottom: var(--spacing-xl); display: flex; justify-content: space-between; align-items: flex-start; }

        .streak-badge { background: linear-gradient(135deg, var(--color-rose-pink), var(--color-cherry-blossom)); padding: 8px 16px; border-radius: var(--border-radius-lg); display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow-subtle); color: #A05252; font-weight: 700; font-size: 14px; }
        .streak-badge svg { width: 16px; height: 16px; fill: currentColor; }

        .dashboard-card { background: var(--glass-bg); border: var(--glass-border); border-radius: var(--border-radius-md); padding: var(--spacing-lg); box-shadow: var(--shadow-floating); display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: background var(--transition-gentle), border var(--transition-gentle), box-shadow var(--transition-gentle); position: relative; overflow: hidden; }
        .dashboard-stat { display: flex; flex-direction: column; align-items: flex-start; z-index: 1; }
        .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--color-text-muted); margin-bottom: var(--spacing-xs); }
        .stat-value { font-size: 24px; font-weight: 700; color: var(--color-text-main); }
        .stat-value.highlight { color: var(--color-muted-plum); }

        .goal-card { background: var(--component-bg); border-radius: var(--border-radius-md); padding: var(--spacing-lg); box-shadow: var(--shadow-subtle); margin-bottom: var(--spacing-xl); transition: background var(--transition-gentle); position: relative; overflow: hidden; }
        .goal-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; z-index: 1; position: relative; }
        .goal-title { font-size: 16px; font-weight: 700; color: var(--color-text-main); }
        .goal-subtitle { font-size: 12px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .goal-progress-bg { width: 100%; height: 12px; background: var(--color-soft-gray); border-radius: 12px; overflow: hidden; margin-bottom: 8px; transition: background var(--transition-gentle); position: relative; z-index: 1; }
        .goal-progress-fill { height: 100%; background: linear-gradient(90deg, var(--color-cherry-blossom), var(--color-muted-plum)); border-radius: 12px; transition: width 1s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .goal-text-row { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--color-text-muted); position: relative; z-index: 1; }

        /* DAILY INTENTION UI */
        .daily-intention-card { display: flex; align-items: center; justify-content: space-between; background: var(--component-bg); border-radius: var(--border-radius-sm); padding: 12px 16px; margin-bottom: var(--spacing-lg); box-shadow: var(--shadow-subtle); border-left: 4px solid var(--color-muted-plum); transition: opacity var(--transition-gentle); }
        .daily-intention-card.completed { opacity: 0.6; border-left-color: var(--color-accent-blue); }
        .intention-text { display: flex; flex-direction: column; }
        .intention-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--color-muted-plum); font-weight: 700; }
        .daily-intention-card.completed .intention-label { color: var(--color-accent-blue); }
        .intention-task { font-size: 14px; font-weight: 600; color: var(--color-text-main); }
        .intention-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--color-soft-violet); display: flex; align-items: center; justify-content: center; color: transparent; transition: all var(--transition-fast); }
        .daily-intention-card.completed .intention-check { background: var(--color-accent-blue); border-color: var(--color-accent-blue); color: white; }
        .intention-check svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }

        .input-field { width: 100%; padding: var(--spacing-md); border: 1px solid rgba(128,128,128,0.1); border-radius: var(--border-radius-sm); font-family: 'Nunito', sans-serif; font-size: 16px; background: var(--input-bg); color: var(--color-text-main); outline: none; transition: all var(--transition-fast); margin-bottom: var(--spacing-md); position: relative; z-index: 2; }
        .input-field:focus { border-color: var(--color-muted-plum); box-shadow: 0 4px 15px rgba(216, 191, 216, 0.2); }
        
        .btn-primary { position: relative; overflow: hidden; width: 100%; padding: var(--spacing-md); border: none; border-radius: var(--border-radius-sm); background: var(--color-muted-plum); color: white; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: background var(--transition-fast), transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-secondary { position: relative; overflow: hidden; width: 100%; padding: var(--spacing-md); border: 2px solid var(--color-soft-violet); border-radius: var(--border-radius-sm); background: transparent; color: var(--color-muted-plum); font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: background var(--transition-fast), transform 0.1s, border-color var(--transition-fast); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-secondary:active { transform: scale(0.98); background: rgba(216, 191, 216, 0.05); }
          /* SKELETON LOADING UI */
        .skeleton { background: var(--skeleton-grad); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--border-radius-sm); transition: background var(--transition-gentle); }
        .skeleton-title { height: 32px; width: 60%; margin-bottom: 8px; }
        .skeleton-text { height: 16px; width: 40%; }
        .skeleton-card { height: 200px; border-radius: var(--border-radius-md); }

        /* EXPLORE & MOOD BROWSING */
        .search-container { position: relative; margin-bottom: var(--spacing-lg); z-index: 10; }
        .search-container svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; stroke: var(--color-text-muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; z-index: 3; }
        .search-input { width: 100%; padding: 16px 16px 16px 48px; border: none; border-radius: var(--border-radius-lg); background: var(--glass-bg); box-shadow: var(--shadow-subtle); font-family: 'Nunito', sans-serif; font-size: 16px; color: var(--color-text-main); outline: none; transition: box-shadow var(--transition-fast), background var(--transition-gentle); position: relative; z-index: 2; }
        .search-input:focus { box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
        
        .search-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: var(--glass-border); border-top: none; border-radius: 0 0 var(--border-radius-lg) var(--border-radius-lg); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 1; }
        .search-suggestions.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .suggestion-item { padding: 14px 20px; font-size: 14px; font-weight: 600; color: var(--color-text-main); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background var(--transition-fast); border-bottom: 1px solid rgba(128,128,128,0.05); }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:active { background: rgba(216, 191, 216, 0.2); }
        .suggestion-icon { font-size: 16px; opacity: 0.8; }

        .filter-section-title { font-size: 14px; font-weight: 700; color: var(--color-text-main); margin-bottom: 12px; display: block; }
        .category-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 12px; margin-bottom: var(--spacing-md); scrollbar-width: none; }
        .category-scroll::-webkit-scrollbar { display: none; }
        
        .category-pill { position: relative; overflow: hidden; padding: 8px 20px; background: var(--component-bg); border-radius: var(--border-radius-lg); font-size: 14px; font-weight: 600; color: var(--color-text-muted); white-space: nowrap; box-shadow: var(--shadow-subtle); cursor: pointer; transition: all var(--transition-fast); border: 1px solid transparent; }
        .category-pill.active { background: var(--color-muted-plum); color: white; }
        
        .mood-pill { position: relative; overflow: hidden; padding: 8px 16px; background: var(--pill-bg); border-radius: var(--border-radius-sm); font-size: 14px; font-weight: 600; color: var(--color-text-main); white-space: nowrap; cursor: pointer; transition: all var(--transition-fast); border: 1px solid var(--color-soft-violet); display: flex; align-items: center; gap: 6px; }
        .mood-pill.active { background: var(--color-soft-violet); color: #fff; border-color: var(--color-muted-plum); }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding-bottom: var(--spacing-xxl); }
        .product-card { position: relative; overflow: hidden; background: var(--component-bg); border-radius: var(--border-radius-md); box-shadow: var(--shadow-subtle); display: flex; flex-direction: column; cursor: pointer; transition: transform var(--transition-fast), background var(--transition-gentle); }
        .product-card:active { transform: scale(0.97); }
        .product-image { width: 100%; aspect-ratio: 1; border-bottom: 1px solid rgba(128,128,128,0.05); display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; }
        .product-info { padding: 12px; display: flex; flex-direction: column; gap: 4px; pointer-events: none; }
        .product-brand { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--color-text-muted); }
        .product-name { font-size: 14px; font-weight: 700; color: var(--color-text-main); line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { font-size: 14px; font-weight: 700; color: var(--color-muted-plum); margin-top: 4px; }
        .product-mrp { font-size: 12px; color: var(--color-text-muted); text-decoration: line-through; margin-left: 6px; font-weight: 400; }

        /* PRODUCT DETAIL, CART & MODAL */
        .top-app-bar { display: flex; align-items: center; justify-content: space-between; padding: var(--spacing-md) var(--spacing-lg); margin-bottom: var(--spacing-md); }
        .btn-icon { position: relative; overflow: hidden; width: 40px; height: 40px; border-radius: 50%; background: var(--component-bg); box-shadow: var(--shadow-subtle); display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; color: var(--color-text-main); transition: background var(--transition-gentle); }
        .btn-icon:active { transform: scale(0.95); }
        .btn-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
        
        .hero-image-container { width: 100%; aspect-ratio: 1; border-radius: var(--border-radius-lg); display: flex; align-items: center; justify-content: center; font-size: 80px; margin-bottom: var(--spacing-lg); box-shadow: var(--shadow-floating); }
        .detail-brand { font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--color-muted-plum); font-weight: 700; margin-bottom: 4px; }
        .detail-name { font-size: 28px; font-weight: 700; color: var(--color-text-main); line-height: 1.2; margin-bottom: 12px; }
        .detail-price-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: var(--spacing-lg); }
        .detail-price { font-size: 24px; font-weight: 700; color: var(--color-text-main); }
        .detail-mrp { font-size: 16px; color: var(--color-text-muted); text-decoration: line-through; }
        .detail-description { font-size: 16px; color: var(--color-text-muted); line-height: 1.6; margin-bottom: var(--spacing-xl); }
        .action-row { display: flex; flex-direction: column; gap: 12px; margin-bottom: var(--spacing-xl); }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: var(--spacing-xxl) 0; color: var(--color-text-muted); }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: var(--spacing-md); stroke: var(--color-soft-violet); stroke-width: 1; fill: none; }
        .empty-state h3 { font-size: 20px; font-weight: 700; color: var(--color-text-main); margin-bottom: 8px; }
        .empty-state p { font-size: 16px; margin-bottom: var(--spacing-lg); line-height: 1.5; }

        .cart-item { display: flex; align-items: center; background: var(--component-bg); padding: 12px; border-radius: var(--border-radius-md); box-shadow: var(--shadow-subtle); margin-bottom: 12px; transition: background var(--transition-gentle); }
        .cart-item-img { width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 16px; }
        .cart-item-details { flex: 1; display: flex; flex-direction: column; }
        .cart-item-name { font-size: 14px; font-weight: 700; color: var(--color-text-main); }
        .cart-item-price { font-size: 14px; color: var(--color-muted-plum); font-weight: 700; }
        .cart-item-remove { position: relative; overflow: hidden; width: 32px; height: 32px; border-radius: 50%; background: var(--color-soft-gray); border: none; color: var(--color-text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background var(--transition-gentle); }
        .cart-total-bar { margin-top: var(--spacing-lg); padding-top: var(--spacing-md); border-top: 1px solid rgba(128,128,128,0.1); display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg); }
        
        .checkout-timeline { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; }
        .checkout-icon { font-size: 64px; margin-bottom: 24px; animation: bounceSoft 1s infinite alternate ease-in-out; }
        .checkout-status { font-size: 24px; font-weight: 700; color: var(--color-muted-plum); margin-bottom: 8px; transition: opacity 0.3s; }
        .checkout-subtext { font-size: 16px; color: var(--color-text-muted); text-align: center; }
        .celebration-card { background: linear-gradient(135deg, var(--color-warm-white), var(--color-lavender)); border: 2px solid var(--color-soft-violet); padding: var(--spacing-lg); border-radius: var(--border-radius-lg); text-align: center; box-shadow: var(--shadow-floating); animation: scaleIn 0.5s var(--transition-gentle); }

        .profile-hero { display: flex; align-items: center; margin-bottom: var(--spacing-xl); }
        .profile-avatar { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--color-muted-plum), var(--color-cherry-blossom)); color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; margin-right: 16px; box-shadow: var(--shadow-floating); text-transform: uppercase; }
        .profile-info { flex: 1; }
        .progress-container { width: 100%; background: var(--color-soft-gray); border-radius: 10px; height: 8px; margin-top: 8px; overflow: hidden; transition: background var(--transition-gentle); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--color-accent-blue), var(--color-muted-plum)); border-radius: 10px; transition: width 0.5s ease; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: var(--spacing-xl); }
        .stat-box { background: var(--component-bg); padding: 16px; border-radius: var(--border-radius-md); box-shadow: var(--shadow-subtle); display: flex; flex-direction: column; align-items: flex-start; transition: background var(--transition-gentle); }
        .stat-box-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--color-soft-violet); color: #fff; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .stat-box-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .stat-box-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--color-text-muted); margin-bottom: 4px; }
        .stat-box-value { font-size: 20px; font-weight: 700; color: var(--color-text-main); }
        .achievements-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: var(--spacing-xxl); }
        .achievement-badge { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; transition: all var(--transition-gentle); }
        .achievement-badge.locked { opacity: 0.4; filter: grayscale(1); }
        .achievement-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--component-bg); box-shadow: var(--shadow-subtle); display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px solid transparent; }
        .achievement-badge:not(.locked) .achievement-icon { border-color: var(--color-cherry-blossom); background: linear-gradient(135deg, var(--color-warm-white), var(--color-rose-pink)); }
        .achievement-title { font-size: 11px; font-weight: 700; color: var(--color-text-main); line-height: 1.2; }
        .achievement-desc { font-size: 9px; color: var(--color-text-muted); line-height: 1.2; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); z-index: 2000; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--component-bg); width: 100%; border-radius: 24px 24px 0 0; padding: 24px; padding-bottom: calc(24px + env(safe-area-inset-bottom, 15px)); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), background var(--transition-gentle); max-height: 90vh; overflow-y: auto; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-handle { width: 40px; height: 4px; background: var(--color-text-muted); border-radius: 4px; margin: 0 auto 24px auto; opacity: 0.3; }
         /* TOAST NOTIFICATIONS */

                appState.preferences.theme = appState.preferences.theme === 'light' ? 'dark' : 'light';

                    const index = appState.wishlists.indexOf(product.id);
                    if (index > -1) { appState.wishlists.splice(index, 1); } 
                    else { appState.wishlists.push(product.id); GamificationEngine.addCuriosityXP(); NotificationEngine.show("Dream Saved", "Added to your inspiration board.", "🌌"); GoalEngine.evaluate('save_dream'); }
                    StorageEngine.save(); updateDreamUI();
                };
                return screen;
            },
            
            // --- NEW: Custom Dream Form Builder ---
            buildCreateDream: () => {
                const screen = document.createElement('div'); screen.className = 'screen'; screen.style.paddingTop = '0'; screen.style.animation = 'slideInRight var(--transition-gentle)';
                
                screen.innerHTML = `
                    <div class="top-app-bar" style="margin-left: -var(--spacing-lg); margin-right: -var(--spacing-lg);">
                        <button class="btn-icon" id="back-btn"><svg viewBox="0 0 24 24"><path d="M19 12H5"></path><polyline points="12 19 5 12 12 5"></polyline></svg></button>
                    </div>
                    <div class="header-section" style="margin-bottom: 24px;">
                        <div><h2 class="text-title">Custom Dream</h2><p class="text-subtitle" style="margin-top: 4px;">Save an item you saw in real life.</p></div>
                    </div>
                    
                    <div class="dashboard-card" style="flex-direction: column; align-items: flex-start;">
                        <label style="font-size: 12px; color: var(--color-text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">Product Name</label>
                        <input type="text" id="cd-name" class="input-field" placeholder="e.g. Vintage Record Player" autocomplete="off">
                        
                        <label style="font-size: 12px; color: var(--color-text-muted); margin-bottom: 8px; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px;">Brand (Optional)</label>
                        <input type="text" id="cd-brand" class="input-field" placeholder="e.g. Sony" autocomplete="off">
                        
                        <div style="display: flex; gap: 16px; width: 100%;">
                            <div style="flex: 1;">
                                <label style="font-size: 12px; color: var(--color-text-muted); margin-bottom: 8px; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; display:block;">Price (₹)</label>
                                <input type="number" id="cd-price" class="input-field" placeholder="0" autocomplete="off">
                            </div>
                            <div style="flex: 0 0 80px;">
                                <label style="font-size: 12px; color: var(--color-text-muted); margin-bottom: 8px; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; display:block;">Emoji</label>
                                <input type="text" id="cd-icon" class="input-field" placeholder="✨" value="✨" maxlength="2" autocomplete="off" style="text-align: center;">
                            </div>
                        </div>

                        <label style="font-size: 12px; color: var(--color-text-muted); margin-bottom: 8px; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px;">Description</label>
                        <textarea id="cd-desc" class="input-field" placeholder="Why do you want this?" style="resize: none; height: 100px; font-family: 'Nunito', sans-serif;"></textarea>
                        
                        <button id="save-custom-btn" class="btn-primary" style="margin-top: 16px;">Save to Dreams</button>
                    </div>
                `;

                screen.querySelector('#back-btn').onclick = () => ScreenManager.navigate('collections');
                
                const saveBtn = screen.querySelector('#save-custom-btn');
                saveBtn.onclick = () => {
                    const name = screen.querySelector('#cd-name').value.trim();
                    if (!name) return NotificationEngine.show("Missing Name", "Please give your dream a name.", "⚠️");
                    
                    const priceVal = parseInt(screen.querySelector('#cd-price').value) || 0;
                    
                    // Generate a beautiful random gradient for their custom item
                    const gradients = [
                        "linear-gradient(135deg, #FFB7C5, #FFFDD0)", // Warm
                        "linear-gradient(135deg, #AEC6CF, #E6E6FA)", // Cool
                        "linear-gradient(135deg, #D8BFD8, #FFD1DC)", // Pink
                        "linear-gradient(135deg, #E6E6FA, #F5F5F7)"  // Minimal
                    ];
                    const randGrad = gradients[Math.floor(Math.random() * gradients.length)];

                    const newProduct = {
                        id: `c_${Date.now()}`, // Unique ID prefixed with c_
                        brand: screen.querySelector('#cd-brand').value.trim() || "Custom",
                        name: name,
                        category: "Custom",
                        moods: ["Creative"], // Default mood so it shows in search
                        price: priceVal,
                        mrp: priceVal,
                        gradient: randGrad,
                        icon: screen.querySelector('#cd-icon').value.trim() || "✨",
                        description: screen.querySelector('#cd-desc').value.trim() || "A custom dream created by you."
                    };

                    appState.customProducts.push(newProduct);
                    appState.wishlists.unshift(newProduct.id); // Add directly to top of wishlist
                    
                    GoalEngine.evaluate('create_custom');
                    AchievementsEngine.evaluate(); // Will trigger 'Architect' achievement!
                    StorageEngine.save();
                    
                    NotificationEngine.show("Dream Saved", "Custom item added to your platform.", "🎨");
                    ScreenManager.navigate('collections');
                };

                return screen;
            },

            buildProfile: () => {
                const screen = document.createElement('div'); screen.className = 'screen';
                const fmtSavings = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(appState.profile.moneySaved);
                const ordersSimulated = appState.profile.ordersCompleted || 0;
                const dreamsCount = appState.wishlists.length;
                const currentXP = appState.profile.xp;
                const levelBoundary = appState.profile.level * 100; 
                const prevBoundary = (appState.profile.level - 1) * 100;
                const progressPercentage = Math.min(100, Math.max(0, ((currentXP - prevBoundary) / 100) * 100));
                const userInitial = appState.profile.name.charAt(0).toUpperCase();

                let achievementsHTML = `<div class="achievements-grid">`;
                AchievementsEngine.list.forEach(ach => {
                    const isUnlocked = appState.achievements.includes(ach.id);
                    achievementsHTML += `<div class="achievement-badge ${isUnlocked ? '' : 'locked'}"><div class="achievement-icon">${ach.icon}</div><span class="achievement-title">${ach.title}</span><span class="achievement-desc">${ach.desc}</span></div>`;
                });
                achievementsHTML += `</div>`;

                screen.innerHTML = `
                    <div class="header-section" style="margin-bottom: 24px;"><div><h2 class="text-title">Dashboard</h2><p class="text-subtitle" style="margin-top: 4px;">Your digital footprint.</p></div><button class="btn-icon" id="settings-btn" style="box-shadow: none; border: 1px solid var(--color-soft-gray);"><svg viewBox="0 0 24 24" style="stroke: var(--color-text-muted);"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button></div>
                    <div class="profile-hero"><div class="profile-avatar">${userInitial}</div><div class="profile-info"><h3 style="font-size: 20px; font-weight: 700; color: var(--color-text-main); line-height: 1.2;">${appState.profile.name}</h3><span style="font-size: 14px; color: var(--color-muted-plum); font-weight: 700;">Level ${appState.profile.level} Explorer</span><div class="progress-container"><div class="progress-fill" style="width: ${progressPercentage}%;"></div></div><span style="font-size: 10px; color: var(--color-text-muted); float: right; margin-top: 4px;">${currentXP} / ${levelBoundary} XP</span></div></div>
                    <div class="stats-grid">
                        <div class="stat-box"><div class="stat-box-icon"><svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></div><span class="stat-box-label">Money Kept</span><span class="stat-box-value" style="color: var(--color-muted-plum);">${fmtSavings}</span></div>
                        <div class="stat-box"><div class="stat-box-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg></div><span class="stat-box-label">Orders Simulated</span><span class="stat-box-value">${ordersSimulated}</span></div>
                        <div class="stat-box"><div class="stat-box-icon"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></div><span class="stat-box-label">Curated Dreams</span><span class="stat-box-value">${dreamsCount} Items</span></div>
                        <div class="stat-box"><div class="stat-box-icon" style="background: rgba(255,183,197, 0.2); color: var(--color-muted-plum);"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></div><span class="stat-box-label">Longest Streak</span><span class="stat-box-value">${appState.streak.current} Days</span></div>
                    </div>
                    <span class="filter-section-title" style="margin-top: 16px;">Milestones & Achievements</span>
                    ${achievementsHTML}
                `;
                screen.querySelector('#settings-btn').onclick = () => Components.buildSettingsModal();
                return screen;
            }
        };
        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            console.log(`iSS Initializing (v${CONFIG.version})...`);
            StorageEngine.load();
            ThemeEngine.apply(appState.preferences.theme);
            InteractionEngine.init(); 
            NotificationEngine.init(); 
            GoalEngine.init(); 
            GamificationEngine.processDailyVisit();
            document.getElementById('app-container').appendChild(Components.buildBottomNav());
            ScreenManager.navigate('home');
        });
    </script>

</body>
</html>
